<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScentSys | Gestión de Perfumes</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --ubuntu-orange: #E95420;
            --ubuntu-aubergine: #772953;
            --ubuntu-dark: #2C001E;
            --bg-light: #F7F7F9;
            --card-bg: #FFFFFF;
            --text-main: #333333;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --btn-create: #38B000;
            --btn-read: #0077B6;
            --btn-update: #F5A623;
            --btn-delete: #D00000;
            --terminal-bg: #300A24;
            --terminal-text: #FFFFFF;
            --terminal-success: #8AE234;
            --terminal-error: #EF2929;
            --terminal-info: #729FCF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-light); color: var(--text-main); }
        h1, h2, h3 { font-family: 'Ubuntu', sans-serif; }

        .global-navbar { background-color: var(--ubuntu-dark); color: white; padding: 0.5rem 2rem; display: flex; gap: 1.5rem; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--ubuntu-orange); }
        .global-navbar a { color: white; text-decoration: none; font-family: 'Ubuntu', sans-serif; padding: 0.5rem 1rem; border-radius: 4px; display: flex; align-items: center; gap: 8px; }
        .global-navbar a.active { background-color: rgba(255,255,255,0.1); color: var(--ubuntu-orange); }

        header { background: linear-gradient(135deg, var(--ubuntu-dark), var(--ubuntu-aubergine)); color: white; padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .btn-link { text-decoration: none; background-color: var(--ubuntu-orange); color: white; padding: 0.5rem 1.2rem; border-radius: 20px; font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }

        .container { max-width: 1400px; margin: 2rem auto; padding: 0 1rem; display: grid; grid-template-columns: 350px 1fr; gap: 2rem; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-header { border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1.5rem; color: var(--ubuntu-aubergine); font-weight: 600; }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-muted); }
        .form-control { width: 100%; padding: 0.7rem; border: 1px solid var(--border-color); border-radius: 6px; }

        .image-upload-wrapper { position: relative; height: 180px; border: 2px dashed var(--border-color); border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; overflow: hidden; }
        #imagePreview { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; }

        .crud-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem; }
        .btn { padding: 0.8rem; border: none; border-radius: 6px; color: white; font-weight: 600; cursor: pointer; }
        .btn-create { background-color: var(--btn-create); }
        .btn-read { background-color: var(--btn-read); }
        .btn-update { background-color: var(--btn-update); }
        .btn-delete { background-color: var(--btn-delete); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: white; padding: 1.2rem; border-radius: 10px; border-left: 4px solid var(--ubuntu-orange); }
        .stat-value { font-size: 1.8rem; font-weight: 700; }

        .terminal { background-color: var(--terminal-bg); border-radius: 8px; padding: 1.2rem; font-family: monospace; height: 200px; overflow-y: auto; color: white; font-size: 0.85rem; }
        .log-success { color: var(--terminal-success); }
        .log-error { color: var(--terminal-error); }
        .log-info { color: var(--terminal-info); }
        .log-warning { color: #FCE94F; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: var(--bg-light); color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }
        .img-thumb { width: 45px; height: 45px; background: #eee; border-radius: 6px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    </style>
</head>
<body>

    <nav class="global-navbar">
        <a href="/marcas"><i class="fa-solid fa-tags"></i> Marcas</a>
        <a href="/perfumes" class="active"><i class="fa-solid fa-spray-can-sparkles"></i> Perfumes</a>
    </nav>

    <header>
        <h1><i class="fa-solid fa-spray-can-sparkles"></i> ScentSys Admin - Perfumes</h1>
        <div class="header-actions">
            <a href="/marcas" class="btn-link"><i class="fa-solid fa-arrow-left"></i> Volver a Marcas</a>
        </div>
    </header>

    <div class="container">
        <aside>
            <div class="card">
                <div class="card-header">Gestión de Producto</div>
                <form id="perfumeForm">
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group">
                            <label>ID Perfume (Update/Delete)</label>
                            <input type="number" id="prodId" class="form-control" placeholder="Ej. 1">
                        </div>
                        <div class="form-group">
                            <label>ID Marca</label>
                            <input type="number" id="brandId" class="form-control" placeholder="ID de la marca" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="prodName" class="form-control" required>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group">
                            <label>ML</label>
                            <input type="number" id="prodVol" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Tipo</label>
                            <select id="prodConc" class="form-control">
                                <option value="EDP">EDP</option>
                                <option value="EDT">EDT</option>
                                <option value="Parfum">Parfum</option>
                                <option value="Elixir">Elixir</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Precio ($)</label>
                        <input type="number" id="prodPrice" class="form-control" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Imagen</label>
                        <div class="image-upload-wrapper" onclick="document.getElementById('prodImage').click()">
                            <i class="fa-solid fa-upload"></i>
                            <input type="file" id="prodImage" style="display:none" accept="image/*">
                            <img id="imagePreview">
                        </div>
                    </div>
                    <div class="crud-buttons">
                        <button type="button" class="btn btn-create" onclick="createPerfume()">Create</button>
                        <button type="button" class="btn btn-read" onclick="fetchPerfumes()">Read</button>
                        <button type="button" class="btn btn-update" onclick="updatePerfume()">Update</button>
                        <button type="button" class="btn btn-delete" onclick="deletePerfume()">Delete</button>
                    </div>
                </form>
            </div>
        </aside>

        <main>
            <div class="stats-grid">
                <div class="stat-card"><div>Fragancias</div><div class="stat-value" id="count-perfumes">0</div></div>
                <div class="stat-card"><div>Categorías</div><div class="stat-value">Activo</div></div>
                <div class="stat-card"><div>DB Status</div><div class="stat-value" style="font-size: 1.2rem; color: #38B000; margin-top: 10px;">Online</div></div>
            </div>

            <div class="card" style="background-color: var(--terminal-bg); padding: 10px;">
                <div class="terminal" id="terminalLog">
                    <div class="log-info">[SISTEMA] Listo para operar API Perfumes.</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Catálogo de Fragancias</div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>ML</th>
                                <th>Tipo</th>
                                <th>Precio</th>
                            </tr>
                        </thead>
                        <tbody id="perfumeTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const log = (msg, type='info') => {
            const div = document.getElementById('terminalLog');
            const time = new Date().toLocaleTimeString();
            div.innerHTML += `<div class="log-${type}">[${time}] ${msg}</div>`;
            div.scrollTop = div.scrollHeight;
        };

        // --- Cargar Perfumes (READ) ---
        async function fetchPerfumes() {
            try {
                const params = new URLSearchParams(window.location.search);
                const idMarca = params.get('id_marca');
                const url = idMarca ? `/api/marcas/${idMarca}/perfumes` : `/api/perfumes`;
                
                log(`Consultando: ${url}...`, 'info');
                const res = await fetch(url);
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || "Error al obtener datos");

                const tbody = document.getElementById('perfumeTableBody');
                tbody.innerHTML = '';
                
                data.forEach(p => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${p.id_perfume}</td>
                            <td>
                                <div class="img-thumb">
                                    ${p.imagen_perfume 
                                        ? `<img src="${p.imagen_perfume}" style="width:100%; height:100%; object-fit:cover;">` 
                                        : '<i class="fa-solid fa-bottle-droplet" style="color: #999;"></i>'}
                                </div>
                            </td>
                            <td><strong>${p.nombre}</strong> <br><small style="color: #888;">Marca ID: ${p.id_marca}</small></td>
                            <td>${p.ml} ml</td>
                            <td><span style="background:#eee; padding:2px 8px; border-radius:10px; font-size:12px;">${p.concentracion}</span></td>
                            <td>$${p.precio}</td>
                        </tr>`;
                });
                document.getElementById('count-perfumes').innerText = data.length;
                log(`[OK] ${data.length} perfumes cargados.`, 'success');

            } catch (e) {
                log(`[ERROR] ${e.message}`, 'error');
            }
        }

        // --- Guardar Perfume (CREATE) ---
        async function createPerfume() {
            const brandId = document.getElementById('brandId').value;
            const name = document.getElementById('prodName').value;
            const ml = document.getElementById('prodVol').value;
            const conc = document.getElementById('prodConc').value;
            const price = document.getElementById('prodPrice').value;
            const imageFile = document.getElementById('prodImage').files[0];

            if (!brandId || !name || !ml || !price) {
                log('[ERROR] Faltan campos obligatorios para guardar.', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('id_marca', brandId);
            formData.append('nombre', name);
            formData.append('ml', ml);
            formData.append('concentracion', conc);
            formData.append('precio', price);
            
            if (imageFile) {
                formData.append('imagen_perfume', imageFile);
            }

            log('[INFO] Enviando petición POST a /api/perfumes...', 'warning');

            try {
                const response = await fetch('/api/perfumes', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    log('[OK] ¡Éxito! Perfume inyectado en la base de datos.', 'success');
                    fetchPerfumes(); 
                    
                    document.getElementById('perfumeForm').reset();
                    document.getElementById('imagePreview').style.display = 'none';
                    
                    const params = new URLSearchParams(window.location.search);
                    if(params.get('id_marca')) document.getElementById('brandId').value = params.get('id_marca');
                } else {
                    const err = await response.json();
                    log(`[ERROR] ${err.error}`, 'error');
                }
            } catch (error) {
                log(`[ERROR] Fallo de red: ${error.message}`, 'error');
            }
        }

        // --- Actualizar Perfume (UPDATE) ---
        async function updatePerfume() {
            const id = document.getElementById('prodId').value;
            const brandId = document.getElementById('brandId').value;
            const name = document.getElementById('prodName').value;
            const ml = document.getElementById('prodVol').value;
            const conc = document.getElementById('prodConc').value;
            const price = document.getElementById('prodPrice').value;
            const imageFile = document.getElementById('prodImage').files[0];

            if (!id) {
                log('[ERROR] Necesitas el ID del Perfume para actualizar.', 'error');
                return;
            }
            if (!brandId || !name || !ml || !price) {
                log('[ERROR] Faltan campos obligatorios para actualizar.', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('id_marca', brandId);
            formData.append('nombre', name);
            formData.append('ml', ml);
            formData.append('concentracion', conc);
            formData.append('precio', price);
            if (imageFile) formData.append('imagen_perfume', imageFile);

            log(`[UPDATE] Enviando petición PUT a /api/perfumes/${id}...`, 'warning');

            try {
                const response = await fetch(`/api/perfumes/${id}`, {
                    method: 'PUT',
                    body: formData
                });

                if (response.ok) {
                    log('[OK] Perfume actualizado con éxito.', 'success');
                    fetchPerfumes();
                    document.getElementById('perfumeForm').reset();
                    document.getElementById('imagePreview').style.display = 'none';
                } else {
                    const err = await response.json();
                    log(`[ERROR] ${err.error}`, 'error');
                }
            } catch (error) {
                log(`[ERROR] Fallo de red: ${error.message}`, 'error');
            }
        }

        // --- Eliminar Perfume (DELETE) ---
        async function deletePerfume() {
            const id = document.getElementById('prodId').value;

            if (!id) {
                log('[ERROR] Necesitas el ID del Perfume para eliminar.', 'error');
                return;
            }

            if (!confirm(`¿Estás seguro de eliminar el perfume con ID ${id}?`)) {
                return;
            }

            log(`[DELETE] Enviando petición DELETE a /api/perfumes/${id}...`, 'error');

            try {
                const response = await fetch(`/api/perfumes/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    log('[OK] Perfume eliminado.', 'success');
                    fetchPerfumes();
                    document.getElementById('perfumeForm').reset();
                } else {
                    const err = await response.json();
                    log(`[ERROR] ${err.error}`, 'error');
                }
            } catch (error) {
                log(`[ERROR] Fallo de red: ${error.message}`, 'error');
            }
        }

        // Previsualizar Imagen
        document.getElementById('prodImage').onchange = e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => {
                    const img = document.getElementById('imagePreview');
                    img.src = ev.target.result;
                    img.style.display = 'block';
                    log('[INFO] Imagen lista para enviar.', 'info');
                };
                reader.readAsDataURL(file);
            }
        };

        // Al iniciar
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if(params.get('id_marca')) {
                document.getElementById('brandId').value = params.get('id_marca');
                log(`[Filtro Activo] Mostrando perfumes de la Marca ID: ${params.get('id_marca')}`, 'warning');
            }
            fetchPerfumes();
        };
    </script>
</body>
</html>
